<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Finder</title>
</head>
<body>

  <h1>🎬 Movie Search App</h1>

  <input type="text" id="searchInput" placeholder="Enter movie name..." />
  <button id="searchBtn">Search</button>

  <div id="movieContainer"></div>

  <script>
    const apiKey = "8c669185"; // replace this

const searchBtn = document.getElementById("searchBtn");
const searchInput = document.getElementById("searchInput");
const movieContainer = document.getElementById("movieContainer");

searchBtn.addEventListener("click", () => {
  const movieName = searchInput.value.trim();

  if (movieName === "") {
    alert("Please enter a movie name");
    return;
  }

  fetchMovie(movieName);
});

async function fetchMovie(movie) {
  try {
    const response = await fetch(
      `https://www.omdbapi.com/?t=${movie}&apikey=${apiKey}`
    );

    const data = await response.json();

    if (data.Response === "False") {
      movieContainer.innerHTML = `<p>Movie not found ❌</p>`;
      return;
    }

    displayMovie(data);

  } catch (error) {
    console.error("Error fetching movie:", error);
    movieContainer.innerHTML = `<p>Something went wrong ⚠️</p>`;
  }
}
function displayMovie(movie) {
  movieContainer.innerHTML = `
    <div class="movie-card">
      <img src="${movie.Poster}" alt="${movie.Title}" />

      <h2>${movie.Title}</h2>
      <p>${movie.Plot}</p>

      <button onclick="watchTrailer('${movie.Title}')">
        ▶ Watch Trailer
      </button>

      <div id="trailer"></div>
    </div>
  `;
}

function watchTrailer(title) {
  const trailerContainer = document.getElementById("trailer");

  const query = encodeURIComponent(title + " trailer");

  trailerContainer.innerHTML = `
    <iframe 
      width="100%" 
      height="315"
      src="https://www.youtube.com/embed?listType=search&list=${query}"
      frameborder="0"
      allowfullscreen>
    </iframe>
  `;
}

function displayMoviesList(movies) {
  movieContainer.innerHTML = "";

  movies.forEach(movie => {
    const card = document.createElement("div");
    card.classList.add("movie-card");

    card.innerHTML = `
      <img src="${movie.Poster}" />
      <h3>${movie.Title}</h3>
      <div class="preview"></div>
    `;

    // Hover events
    card.addEventListener("mouseenter", () => {
      showPreview(movie.Title, card);
    });

    card.addEventListener("mouseleave", () => {
      removePreview(card);
    });

    movieContainer.appendChild(card);
  });
}

function showPreview(title, card) {
  const previewDiv = card.querySelector(".preview");

  const query = encodeURIComponent(title + " trailer");

  previewDiv.innerHTML = `
    <iframe 
      width="250" 
      height="150"
      src="https://www.youtube.com/embed?listType=search&list=${query}&autoplay=1&mute=1"
      frameborder="0">
    </iframe>
  `;
}


  </script>
  <style>
    body {
  font-family: Arial;
  text-align: center;
}

.movie-card {
  position: relative;
  width: 200px;
  cursor: pointer;
}

.preview {
  position: absolute;
  top: 0;
  left: 210px;
  z-index: 10;
  background: black;
}

.movie-card {
  margin-top: 20px;
  padding: 20px;
  border: 1px solid #ddd;
}

img {
  width: 200px;
}
  </style>
</body>
</html>
