<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>movie library app</title>
    <link rel="stylesheet" href="./styles.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" 
        rel="stylesheet">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">CV</div>
    <div class="nav active" title="Home">&#127968;</div>
    <div class="nav" title="Search">&#128269;</div>
    <div class="nav" title="Watchlist">&#128278;</div>
    <div class="nav" title="TV Shows">&#128250;</div>
    <div class="nav" title="Movies">&#127916;</div>
    <div class="nav" title="Cart">&#128722;</div>
    <div class="sbot">
      <div class="nav" title="Settings">&#9881;</div>
      <div class="avatar">L</div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="tabs">
        <div class="tab active" data-kw="adventure">Popular</div>
        <div class="tab" data-kw="action">Action</div>
        <div class="tab" data-kw="comedy">Comedy</div>
        <div class="tab" data-kw="horror">Horror</div>
      </div>
      <div class="tr">
        <div class="sbar"><span>&#128269;</span><input type="text" id="si" placeholder="Search any movie..."/></div>
        <button class="bsearch" id="sb">Search</button>
      </div>
    </div>
    <div class="hero">
      <div class="hbg" id="hbg"></div>
      <div class="hfade"></div>
      <div class="badge">&#11088; Featured Film</div>
      <div class="hcont">
        
        <div class="movie-card">
          

     
    </div>
        <div class="hact">
          <button class="bwatch" id="hwb">&#9654;&nbsp;WATCH</button>
          <button class="binfo" id="hib">&#8505; More Info</button>
        </div>
      </div>
    </div>
    <div class="sec">
      <div class="sech"><div class="sect">New Releases</div><a class="sall" href="#">See all &rarr;</a></div>
      <div class="mgrid" id="gn"></div>
    </div>
    <div class="div"></div>
    <div class="sec">
      <div class="sech"><div class="sect">Trending Now</div><a class="sall" href="#">See all &rarr;</a></div>
      <div class="srow" id="gt"></div>
    </div>
    <div class="div"></div>
    <div class="sec">
      <div class="sech"><div class="sect">Editor's Picks</div><a class="sall" href="#">See all &rarr;</a></div>
      <div class="fgrid" id="ge"></div>
    </div>
    <div class="div"></div>
    <div class="sec" id="gsec" style="display:none">
      <div class="sech"><div class="sect" id="gtit">Results</div></div>
      <div class="mgrid" id="gs"></div>
    </div>
  </main>
  <div class="mov" id="mov">
  <div class="mbox">
    <div class="mh">
      <img id="mp" src="" alt=""/>
      <button class="mx" id="mx">&#10005;</button>
      <div class="mht"><div class="mttl" id="mt"></div></div>
    </div>
    <div class="mb">
      <div class="mmt" id="mm"></div>
      <p class="mpl" id="mpl"></p>
      <div class="mtg" id="mtg"></div>
      <div class="mac">
        <button class="bwatch">&#9654; Watch Now</button>
        <button class="binfo" id="mimdb">&#127916; View on IMDb</button>
      </div>
    </div>
</div>
<script src="./script.js"></script>
</body>
</html>
